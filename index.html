    <script>
      // canonical-host-redirect
      (function () {
        var targetHost = window.location.hostname.toLowerCase();
        var path = window.location.pathname || '/';
        var search = window.location.search || '';
        var hash = window.location.hash || '';

        if (targetHost === 'www.lizmediaapp.com' || targetHost === 'lizmediaapp.github.io') {
          targetHost = 'lizmediaapp.com';
        }

        if (path === '/music' || path.indexOf('/music/') === 0) {
          targetHost = 'music.lizmediaapp.com';
          path = path.replace(/^\/music(?=\/|$)/, '') || '/';
        } else if (path === '/speed' || path.indexOf('/speed/') === 0) {
          targetHost = 'speed.lizmediaapp.com';
          path = path.replace(/^\/speed(?=\/|$)/, '') || '/';
        }

        if (path === '/index.html') {
          path = '/';
        } else {
          path = path.replace(/\/index\.html$/, '/');
        }

        var target = 'https://' + targetHost + path + search + hash;
        if (target !== window.location.href) {
          window.location.replace(target);
        }
      })();
    </script>
