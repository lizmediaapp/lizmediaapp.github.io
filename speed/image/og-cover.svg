      <stop stop-color="#FFE7C7" />
      <stop offset="1" stop-color="#FDBA46" />
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(870 300) rotate(180) scale(380 280)">
      <stop stop-color="#FFF3E5" stop-opacity="0.95" />
      <stop offset="1" stop-color="#FFF3E5" stop-opacity="0" />
