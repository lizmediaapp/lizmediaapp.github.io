  <text x="88" y="212" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="66" font-weight="800">
    LizSpeedTest
  </text>
  <text x="88" y="290" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="600">
